# echov5-backend 默认配置文件
# Docker 部署无需修改此文件，按默认值即可启动
# 生产环境可通过环境变量覆盖各个字段

# 系统安装状态（安装向导完成后自动改为 true）
installed: false

server:
  port: ":8080"
  mode: "debug"
  read_timeout: 30
  write_timeout: 30

database:
  type: "mysql"
  host: "mysql"             # Docker Compose 容器名
  port: 3306
  user: "root"
  password: "yu-mcbbs-2024"
  dbname: "bbs_cms"
  charset: "utf8mb4"
  table_prefix: "yu_"
  max_idle_conns: 10
  max_open_conns: 100
  conn_max_lifetime: 3600

jwt:
  secret: "yu-mcbbs-auto-key-change-in-admin-panel"
  expire_hours: 72
  issuer: "yu-mcbbs"

log:
  level: "debug"          # 日志级别: debug | info | warn | error
  file_path: ""           # 日志文件路径（为空则仅输出到控制台）
  max_size: 100           # 日志文件最大大小（MB）
  max_backups: 10         # 保留的旧日志文件数
  max_age: 30             # 保留天数

cors:
  allow_origins:          # 允许的跨域来源
    - "http://localhost:3000"
    - "http://localhost:3001"
  allow_methods:
    - "GET"
    - "POST"
    - "PUT"
    - "PATCH"
    - "DELETE"
    - "OPTIONS"
  allow_headers:
    - "Origin"
    - "Content-Type"
    - "Authorization"
    - "X-Requested-With"

# 外部资源路径（Docker 部署通过环境变量 THEMES_DIR / PLUGINS_DIR 覆盖）
paths:
  themes_dir: "/shared/themes"
  plugins_dir: "/shared/plugins"
