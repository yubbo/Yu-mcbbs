<!-- themes/default/common/footer.html — 公共页脚 -->

<footer class="border-t border-zinc-200 bg-zinc-50">
  <div class="mx-auto max-w-5xl px-4 py-12">
    <div class="grid grid-cols-1 gap-8 sm:grid-cols-3">
      <div>
        <h3 class="mb-3 text-sm font-semibold text-zinc-900">{SITE_NAME}</h3>
        <p class="text-sm text-zinc-500 leading-relaxed">{SITE_DESCRIPTION}</p>
      </div>
      <div>
        <h3 class="mb-3 text-sm font-semibold text-zinc-900">导航</h3>
        <div class="flex flex-col gap-2 text-sm">
          <a href="{SITE_URL}/login" class="text-zinc-500 no-underline hover:text-zinc-900 transition-colors">登录</a>
          <a href="{SITE_URL}/register" class="text-zinc-500 no-underline hover:text-zinc-900 transition-colors">注册</a>
          <a href="{SITE_URL}/user-admin" class="text-zinc-500 no-underline hover:text-zinc-900 transition-colors">管理后台</a>
        </div>
      </div>
      <div>
        <h3 class="mb-3 text-sm font-semibold text-zinc-900">关于</h3>
        <div class="flex flex-col gap-2 text-sm">
          <span class="text-zinc-500">Go + Echo v5 + Next.js 16</span>
          <span class="text-zinc-500">BBS + 博客 CMS 一体化</span>
        </div>
      </div>
    </div>
    <div class="mt-8 border-t border-zinc-200 pt-6 text-center text-xs text-zinc-400">
      <p>Powered by BBS CMS &copy; {CURRENT_YEAR} {SITE_NAME}</p>
    </div>
  </div>
</footer>
