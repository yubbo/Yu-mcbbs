name: 构建并推送 Docker 镜像

on:
  push:
    branches: [main]
  workflow_dispatch:  # 允许手动触发

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ${{ github.repository_owner }}/yu-mcbbs-backend
  FRONTEND_IMAGE: ${{ github.repository_owner }}/yu-mcbbs-frontend

jobs:
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 构建后端镜像
        working-directory: server
        run: docker build -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest .

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 推送后端镜像
        run: docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

      - name: 设为公开
        run: |
          PACKAGE_ID=$(gh api "/users/${{ github.repository_owner }}/packages/container/yu-mcbbs-backend" --jq '.id')
          echo '{"visibility":"public"}' | gh api --method PATCH "/user/packages/container/yu-mcbbs-backend" --input -
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: 构建前端镜像
        working-directory: frontend
        run: docker build -t ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest .

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 推送前端镜像
        run: docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

      - name: 设为公开
        run: |
          PACKAGE_ID=$(gh api "/users/${{ github.repository_owner }}/packages/container/yu-mcbbs-frontend" --jq '.id')
          echo '{"visibility":"public"}' | gh api --method PATCH "/user/packages/container/yu-mcbbs-frontend" --input -
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
