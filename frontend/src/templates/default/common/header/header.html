<header class="border-b border-zinc-200 bg-white">
  <div class="mx-auto flex max-w-5xl items-center justify-between px-4 py-4">
    <a href="{SITE_URL}" class="text-lg font-semibold text-zinc-900 no-underline">{SITE_NAME}</a>
    <nav class="flex items-center gap-6 text-sm">
      {loop $nav_visible_items $item}
        <a href="{$item.href}" class="text-zinc-600 no-underline hover:text-zinc-900 transition-colors">{$item.label}</a>
      {/loop}
    </nav>
    <div class="flex items-center gap-4 text-sm">
      {if $is_logged_in}
        <a href="{SITE_URL}/user-panel" class="text-zinc-600 no-underline hover:text-zinc-900">{$username}</a>
        {if $is_admin}
        <a href="{SITE_URL}/user-admin" class="text-zinc-600 no-underline hover:text-zinc-900">管理</a>
        {/if}
      {/if}
      {if $is_not_logged_in}
        <a href="{SITE_URL}/login" class="rounded-lg bg-zinc-900 px-4 py-1.5 text-xs font-medium text-white no-underline hover:bg-zinc-800">登录</a>
      {/if}
    </div>
  </div>
</header>
