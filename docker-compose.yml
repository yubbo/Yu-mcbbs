version: "3.8"

services:
  # ── MySQL 8.0 ──
  mysql:
    image: mysql:8.0
    container_name: bbs-cms-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: yu-mcbbs-2024
      MYSQL_DATABASE: bbs_cms
    command: >
      --innodb-buffer-pool-size=32M
      --innodb-log-buffer-size=4M
      --performance-schema=0
      --skip-log-bin
      --max-connections=30
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── 后端（闭源预编译 Go 二进制） ──
  backend:
    image: ghcr.io/yubbo/yu-mcbbs-backend:latest
    container_name: bbs-cms-backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      THEMES_DIR: /shared/themes
      PLUGINS_DIR: /shared/plugins
    ports:
      - "8080:8080"
    volumes:
      - app_data:/shared

  # ── 前端（Next.js 开源） ──
  frontend:
    image: ghcr.io/yubbo/yu-mcbbs-frontend:latest
    container_name: bbs-cms-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      API_BACKEND_URL: http://backend:8080
    ports:
      - "3000:3000"
    volumes:
      - app_data:/app/themes

volumes:
  mysql_data:
  app_data:
